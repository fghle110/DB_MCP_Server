name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./internal/config/... ./internal/security/... ./internal/permission/... -v -race

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -v -o dist/dbmcp-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/dbmcp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbmcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/dbmcp-${{ matrix.goos }}-${{ matrix.goarch }}

version: 2

before:
  hooks:
    - go mod tidy

builds:
  # 标准版：全平台，不含达梦驱动
  - id: dbmcp
    main: ./cmd/dbmcp
    binary: dbmcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  # 达梦版：仅 Linux amd64，含达梦驱动
  - id: dbmcp-dm
    main: ./cmd/dbmcp
    binary: dbmcp-dm
    env:
      - CGO_ENABLED=0
    tags:
      - dm
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: dbmcp
    builds:
      - dbmcp
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - docs/**/*

  - id: dbmcp-dm
    builds:
      - dbmcp-dm
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}-dm_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  use: github

release:
  name_template: "{{.Version}}"
  mode: replace

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dbmcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dbmcp
      POSTGRES_PASSWORD: dbmcp_pass123
      POSTGRES_DB: dbmcp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbmcp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
    driver: local
